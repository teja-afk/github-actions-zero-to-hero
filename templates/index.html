<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Zero To Hero (update)</title>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #7b2ff7;
    }

    .cards {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .card {
      border: 1px solid #555;
      border-radius: 8px;
      padding: 15px;
      min-width: 140px;
      background: rgba(255, 255, 255, 0.05);
    }

    .card span {
      font-size: 12px;
      color: #aaa;
    }

    .card strong {
      display: block;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>DevOps Zero To Hero</h1>

    <div class="cards">

      <div class="card">
        <span>Framework</span>
        <strong>Flask</strong>
      </div>

      <div class="card">
        <span>Runtime</span>
        <strong>Python</strong>
      </div>

      <div class="card">
        <span>Deploy</span>
        <strong>AWS EC2</strong>
      </div>

      <div class="card">
        <span>Pipeline</span>
        <strong>Build ✔ Test ✔ Lint ✔ Deploy ✔</strong>
      </div>

    </div>

  </div>

</body>

</html>

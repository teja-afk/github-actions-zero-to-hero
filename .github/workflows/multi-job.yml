---
name: multi jobs workflow

on:
  # push:
    # branches: [main]
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        run: echo "Building the app"

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Test step
        run: echo "Testing the app"

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy step
        run: echo "Deploying the app"



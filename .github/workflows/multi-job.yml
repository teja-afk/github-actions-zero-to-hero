---
name: multi jobs workflow

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        run: "Building the app"

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Test step
        run: "Testing the app"

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy step
        run: "Deploying the app"



---
name: smart pipeline
on:
  push:
    branches:
      - "**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: print lint
        run:  echo "linting..."

  test:
    runs-on: ubuntu-latest
    steps:
      - name: print test
        run:  echo ""

  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Branch info
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Branch: ${{ github.event.head_commit.message }}"

      - name: Check main or feature branch
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Main branch push"
          else
            echo "Feature branch push"
          fi

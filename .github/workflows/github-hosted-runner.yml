---
name: Runner OS Test

on:
  # push:
  workflow_dispatch:

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print details
        run: |
          echo "OS: Ubuntu"
          hostname
          whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print details
        run: |
          echo "OS: MacOS"
          hostname
          whoami

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print details
        run: |
          echo "OS: Windows"
          hostname
          whoami

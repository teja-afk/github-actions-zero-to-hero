name: Hello

on:
  push:
    branches: [main]
    
    paths:
      - "*.html"

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: say hello to user
        run: echo "Hello Dosto"
      
      - name: say hello to username
        run: echo "Hello $USER"
  
  details:
    runs-on: ubuntu-latest
    steps:
      - name: version of docker, python etc
        run: docker --version && python --version

---
name: environment variables workflow

on:
  push:
    branches: [main]

env:
  APP_NAME: myapp

jobs:
  demo:
    runs-on:  ubuntu-latest

    env:
      ENVIRONMENT: staging

    steps:
      - name: Print variables
        env:
          VERSION: 1.0.0
        run: |
          echo "App: $APP_NAME"
          echo "Env: $ENVIRONMENT"
          echo "Version: $VERSION"
          echo "SHA: ${{ github.ref_sha }}"
          echo "Actor: ${{ github.actor }}"

# This is name of the workflow
name: CICD

on:
  workflow_dispatch: # (manual) (delivery)
    inputs:
      environment:
        description: This is the environment values where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  code:
    # every job needs runner  
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from Github"
  
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker Container build"
  
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
  
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
  
